name: time_tracker_pro
description: "Time Tracker Pro - Riverpod Rebuild"
publish_to: 'none'

version: 1.0.2+8

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.32.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.2.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.0
  intl: ^0.18.1
  equatable: ^2.0.5
  share_plus: ^7.2.1
  file_picker: ^8.1.2
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  web: ^1.1.0
  http: ^1.2.2
  url_launcher: ^6.2.1
  package_info_plus: ^9.0.0
  cupertino_icons: ^1.0.8
  file_saver: ^0.2.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon/TTP_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  windows:
    generate: true
    image_path: "assets/icon/TTP_icon.png"
  web:
    generate: true
    image_path: "assets/icon/pro_pwa_icon.png"
    background_color: "#ffffff"
    theme_color: "#3f51b5"
